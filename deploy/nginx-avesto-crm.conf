# Avesto Group CRM — размещение на своём сервере под подпутём avesto.group/crm
# (nginx). Один домен: статика фронтенда отдаётся под /crm, запросы /crm/api/*
# проксируются на Node-бэкенд (localhost:3000). Всё same-origin — cookie и CORS
# без кросс-доменных костылей.
#
# Установка:
#   1) Соберите фронтенд (см. deploy/DEPLOY.md) и скопируйте
#      frontend/dist/* в /var/www/avesto.group/crm/
#   2) Запустите бэкенд на 127.0.0.1:3000 (systemd-юнит в deploy/DEPLOY.md)
#   3) Положите этот файл в /etc/nginx/sites-available/ и включите symlink’ом;
#      подставьте свои пути к TLS-сертификатам (например, от certbot).
#   4) nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name avesto.group;
    # Весь HTTP → HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name avesto.group;

    # TLS-сертификаты (пример для certbot / Let's Encrypt — подставьте свои).
    ssl_certificate     /etc/letsencrypt/live/avesto.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avesto.group/privkey.pem;

    # Каталог, где лежит собранный фронтенд: файлы в подпапке /crm.
    root /var/www/avesto.group;

    # Загрузка фото/файлов до 2 МБ (лимит совпадает с express.json).
    client_max_body_size 2m;

    # ── API бэкенда под /crm/api → Node на :3000 (сам ожидает /api/...) ──
    # nginx заменяет совпавший префикс «/crm/api/» на «/api/», поэтому
    # /crm/api/auth/login уходит на бэкенд как /api/auth/login.
    location /crm/api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── SPA под /crm ── любой неизвестный путь отдаёт index.html
    # (у приложения нет серверного роутера — маршрут хранится в состоянии).
    location /crm/ {
        try_files $uri $uri/ /crm/index.html;
    }

    # Голый /crm без слэша → на /crm/.
    location = /crm {
        return 301 /crm/;
    }

    # Хэшированные ассеты Vite можно кэшировать надолго.
    location ~* ^/crm/assets/.*\.(js|css|png|jpg|jpeg|svg|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
