name: CI

# Проверка на каждый PR и push в main: чистота кода + работоспособность.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Бэкенд — линт, формат, тесты
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Настоящая PostgreSQL для миграций, seed и интеграционных тестов.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: procystem
          POSTGRES_PASSWORD: procystem
          POSTGRES_DB: procystem
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procystem"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://procystem:procystem@localhost:5432/procystem
      JWT_SECRET: ci_secret_ci_secret_ci_secret_ci_secret_0123456789
      COOKIE_SECURE: "false"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Детерминированная установка строго по package-lock.json.
      - name: Установка зависимостей
        run: npm ci

      # Чистота кода.
      - name: Линт (ESLint)
        run: npm run lint

      - name: Проверка формата (Prettier)
        run: npm run format:check

      # Работоспособность: схема, применение миграций, seed и интеграционные тесты.
      - name: Генерация клиента Prisma
        run: npx prisma generate

      - name: Применение миграций
        run: npx prisma migrate deploy

      - name: Наполнение демо-данными
        run: npm run seed

      - name: Тесты
        run: npm test
