name: Deploy frontend to GitHub Pages

# Публикует собранный фронтенд на GitHub Pages — рабочий сайт для тестирования
# с любого устройства. Запускается при пуше в main и вручную.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Права, необходимые для деплоя на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой Pages за раз. НЕ отменяем идущий деплой (рекомендация GitHub для
# Pages): отмена на середине публикации даёт ошибку «Deployment failed, try
# again later» и оставляет сайт неопубликованным. Промежуточные запуски в
# очереди пропускаются, но текущий доводится до конца.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Сборка сайта
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Установка зависимостей
        run: npm ci

      - name: Сборка (с base под Pages)
        run: npm run build
        env:
          VITE_BASE: /Avesto_Group_CRM/
          # Адрес бэкенда на Render — фронт на Pages обращается к нему за API.
          VITE_API_URL: https://avesto-crm-backend.onrender.com

      # SPA-фолбэк: любой прямой заход отдаёт index.html.
      - name: 404 → index.html
        run: cp dist/index.html dist/404.html

      # .nojekyll — чтобы Pages не прятал файлы, начинающиеся с _.
      - name: Отключить Jekyll
        run: touch dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Публикация
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
